<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Northstar onboarding access handoff flow</title>
  <desc id="desc">A simple fictional handoff diagram showing People Operations, IT Security, the manager, and the employee during onboarding access setup.</desc>
  <rect width="960" height="360" fill="#f7faff"/>
  <g fill="#ffffff" stroke="#174eea" stroke-width="3">
    <rect x="48" y="108" width="174" height="100" rx="10"/>
    <rect x="282" y="108" width="174" height="100" rx="10"/>
    <rect x="516" y="108" width="174" height="100" rx="10"/>
    <rect x="750" y="108" width="174" height="100" rx="10"/>
  </g>
  <g fill="#111c3b" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">
    <text x="135" y="154" text-anchor="middle">People Ops</text>
    <text x="369" y="154" text-anchor="middle">IT Security</text>
    <text x="603" y="154" text-anchor="middle">Manager</text>
    <text x="837" y="154" text-anchor="middle">Employee</text>
  </g>
  <g fill="#62708a" font-family="Arial, Helvetica, sans-serif" font-size="14">
    <text x="135" y="181" text-anchor="middle">creates profile</text>
    <text x="369" y="181" text-anchor="middle">prepares baseline access</text>
    <text x="603" y="181" text-anchor="middle">adds role-specific tools</text>
    <text x="837" y="181" text-anchor="middle">confirms MFA</text>
  </g>
  <g stroke="#62708a" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M222 158h60"/>
    <path d="M456 158h60"/>
    <path d="M690 158h60"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#62708a"/>
    </marker>
  </defs>
  <text x="480" y="274" text-anchor="middle" fill="#c2410c" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Gap: no central 30/60/90 milestones or contractor variant</text>
</svg>
